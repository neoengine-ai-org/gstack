name: Managed Distribution

on:
  pull_request:
    paths:
      - "bin/gstack-config"
      - "bin/gstack-session-update"
      - "bin/gstack-update-check"
      - "gstack-upgrade/**"
      - ".github/workflows/managed-distribution.yml"
  push:
    branches:
      - main
      - "neoengine/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  managed-distribution:
    name: managed distribution verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Verify managed update controls
        run: |
          bash -n bin/gstack-config bin/gstack-session-update bin/gstack-update-check
          test "$(GSTACK_MANAGED=1 bin/gstack-config get auto_upgrade)" = "false"
          GSTACK_MANAGED=1 bin/gstack-update-check
          GSTACK_MANAGED=1 bin/gstack-session-update
      - name: Verify deterministic host generation
        run: |
          bun run gen:skill-docs --host all
          find .agents .hermes .openclaw openclaw -type f -print0 | sort -z | xargs -0 shasum -a 256 > /tmp/host-artifacts-first.sha256
          bun run gen:skill-docs --host all
          find .agents .hermes .openclaw openclaw -type f -print0 | sort -z | xargs -0 shasum -a 256 > /tmp/host-artifacts-second.sha256
          diff -u /tmp/host-artifacts-first.sha256 /tmp/host-artifacts-second.sha256
